# This GitHub Actions workflow builds the Expo-based React Native project for Android.
# It expects a zip file named `bildirim-kaydedici.zip` in the repository root containing
# the project folder `bildirim-kaydedici`. When triggered via a push to main or a
# manual workflow dispatch, it unzips the project, sets up Node.js and the Java
# environment, runs Expo's prebuild step to generate the native Android project,
# and then uses Gradle to assemble a release APK. The resulting APK is published
# as an artifact. Adjust the Node and Java versions as needed for your project.

name: Build Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository contents
      - name: Checkout repository
        uses: actions/checkout@v3

      # Unzip the Expo project from the archive stored in the repository
      - name: Extract project
        run: unzip -o bildirim-kaydedici.zip -d .

      # Set up Node.js for Expo CLI
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # Set up Java JDK for Android build
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install Expo CLI and run the prebuild step to generate the native Android project
      - name: Install Expo CLI and prebuild Android project
        run: |
          npm install -g expo-cli
          cd bildirim-kaydedici
          npx expo prebuild -p android --no-install

      # Build the Android release APK using Gradle
      - name: Build Android APK
        run: |
          cd bildirim-kaydedici/android
          ./gradlew assembleRelease

      # Upload the generated APK as a workflow artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: bildirim-kaydedici/android/app/build/outputs/**/*.apk
